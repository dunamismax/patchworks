{% extends "base.html" %}
{% block title %}SQL Export — patchworks{% endblock %}
{% block content %}
<h2>SQL Export Preview</h2>
<div class="card">
    <form class="form-row"
          hx-get="/export/preview"
          hx-target="#export-result"
          hx-indicator="#export-loading">
        <div>
            <label for="left">Left (base) database</label>
            <input type="text" id="left" name="left" placeholder="/path/to/left.sqlite"
                   value="{{ left|default('') }}">
        </div>
        <div>
            <label for="right">Right (target) database</label>
            <input type="text" id="right" name="right" placeholder="/path/to/right.sqlite"
                   value="{{ right|default('') }}">
        </div>
        <button type="submit" class="btn btn-primary">Generate</button>
        <span id="export-loading" class="htmx-indicator">Loading…</span>
    </form>
</div>
<div id="export-result">
    {% if sql is defined and sql %}
        {% include "partials/export.html" %}
    {% endif %}
</div>
{% endblock %}
